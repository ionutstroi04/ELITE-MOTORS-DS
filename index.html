<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Motors | Dealership Digital Premium</title>
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #2dd4bf;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --hover-bg: rgba(255, 255, 255, 0.08);
            --success: #22c55e;
        }

        body {
            margin: 0; height: 100vh;
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 30%, #1e293b 0%, #020617 70%);
            font-family: 'Inter', system-ui, sans-serif;
            color: white; display: flex; overflow: hidden;
        }

        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: var(--primary); filter: blur(150px);
            border-radius: 50%; z-index: -1; opacity: 0.12;
            animation: float 25s infinite alternate;
        }

        @keyframes float {
            0% { top: 5%; left: 5%; }
            100% { top: 70%; left: 85%; }
        }

        /* SIDEBAR */
        .sidebar {
            width: 380px; background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; z-index: 10;
        }

        .sidebar-header { padding: 30px; border-bottom: 1px solid var(--glass-border); }
        h2 { margin: 0 0 20px 0; font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        input, select {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border); border-radius: 14px;
            color: white; margin-bottom: 12px; box-sizing: border-box; font-size: 0.9rem;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none; border-color: var(--primary); background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        option { background-color: #0f172a; color: white; }

        .car-list { overflow-y: auto; padding: 15px; flex-grow: 1; }
        .car-item {
            padding: 20px; border-radius: 20px; margin-bottom: 12px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid transparent;
        }
        
        .car-item:hover { 
            background: var(--hover-bg); 
            transform: translateX(12px) scale(1.02); 
            border-color: var(--glass-border);
        }
        
        .car-item.active { 
            background: linear-gradient(135deg, var(--primary), #1d4ed8); 
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3);
            transform: scale(1.03);
        }

        /* MAIN CONTENT */
        .main-content {
            flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative;
        }

        #welcome-screen { text-align: center; max-width: 650px; animation: fadeIn 1s ease; }
        #welcome-screen h1 { font-size: 4.5rem; margin-bottom: 15px; background: linear-gradient(to bottom, #fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }

        .glass-panel {
            display: none;
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border); border-radius: 40px;
            padding: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            width: 100%; max-width: 1100px;
        }

        /* IMAGE OVERLAY */
        .img-container {
            position: relative; border-radius: 25px; overflow: hidden; margin-bottom: 30px;
            border: 1px solid var(--glass-border);
        }

        .img-container::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(2, 6, 23, 0.8), transparent);
        }

        .hero-img { width: 100%; max-height: 420px; object-fit: cover; transition: 0.8s ease; }
        .img-container:hover .hero-img { transform: scale(1.05); }

        /* GRID */
        .specs-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .spec-card {
            background: rgba(255,255,255,0.03); padding: 16px; border-radius: 20px;
            border: 1px solid var(--glass-border); transition: 0.3s;
        }
        .spec-card:hover { background: rgba(255,255,255,0.07); transform: translateY(-5px); border-color: var(--accent); }
        .spec-label { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
        .spec-value { font-size: 0.95rem; font-weight: 700; }

        /* CONTACT BAR & BADGE */
        .action-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 30px; padding-top: 25px; border-top: 1px solid var(--glass-border);
        }
        .btn-group { display: flex; gap: 15px; }
        .btn-main {
            background: var(--primary); color: white; padding: 14px 28px; border-radius: 14px;
            font-weight: 700; border: none; cursor: pointer; transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4); }
        .btn-sec {
            background: transparent; border: 1px solid var(--glass-border); color: white;
            padding: 14px 28px; border-radius: 14px; cursor: pointer; transition: 0.3s;
        }
        .btn-sec:hover { background: var(--hover-bg); }

        .stock-badge {
            display: flex; align-items: center; gap: 10px; padding: 8px 16px;
            background: rgba(34, 197, 94, 0.1); border-radius: 30px; border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .pulse {
            width: 8px; height: 8px; background: var(--success); border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        .price-tag { font-size: 3rem; font-weight: 900; color: #fff; text-shadow: 0 0 25px rgba(59, 130, 246, 0.5); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Elite Motors</h2>
            <input type="text" id="searchInput" placeholder="Caută mașina visurilor tale..." onkeyup="renderList()">
            <select id="sortOrder" onchange="renderList()">
                <option value="asc">Preț: crescător</option>
                <option value="desc">Preț: descrescător</option>
            </select>
        </div>
        <div id="carList" class="car-list"></div>
    </div>

    <div class="main-content">
        <div id="welcome-screen">
            <h1>Elite Motors</h1>
            <p style="font-size: 1.2rem; opacity: 0.7; line-height: 1.6;">Standarde ridicate, performanță fără compromis. Selectează un vehicul din colecția noastră pentru a accesa dosarul tehnic complet.</p>
            <div style="margin-top: 40px; width: 60px; height: 3px; background: var(--primary); display: inline-block; border-radius: 10px;"></div>
        </div>

        <div id="car-details" class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px;">
                <div>
                    <h1 id="det-nume" style="font-size: 3.2rem; margin: 0; font-weight: 800; letter-spacing: -2px;"></h1>
                    <div id="det-tara" style="display: inline-block; margin-top: 12px; background: rgba(45, 212, 191, 0.1); color: var(--accent); padding: 6px 18px; border-radius: 30px; font-size: 0.8rem; font-weight: 600; border: 1px solid var(--accent);"></div>
                </div>
                <div id="det-pret" class="price-tag"></div>
            </div>
            
            <div class="img-container">
                <img id="det-img" class="hero-img" src="" alt="Auto">
            </div>

            <div class="specs-grid">
                <div class="spec-card"><div class="spec-label">Motorizare</div><div id="det-motor" class="spec-value"></div></div>
                <div class="spec-card"><div class="spec-label">Putere</div><div id="det-hp" class="spec-value"></div></div>
                <div class="spec-card"><div class="spec-label">Tracțiune</div><div id="det-tractiune" class="spec-value"></div></div>
                <div class="spec-card"><div class="spec-label">Kilometraj</div><div id="det-km" class="spec-value"></div></div>
                <div class="spec-card"><div class="spec-label">Accelerație</div><div id="det-acc" class="spec-value"></div></div>
                <div class="spec-card"><div class="spec-label">Viteză Max</div><div id="det-speed" class="spec-value"></div></div>
                <div class="spec-card"><div class="spec-label">Normă</div><div id="det-euro" class="spec-value"></div></div>
                <div class="spec-card"><div class="spec-label">Greutate</div><div id="det-weight" class="spec-value"></div></div>
                <div class="spec-card"><div class="spec-label">Faruri</div><div id="det-lights" class="spec-value"></div></div>
                <div class="spec-card"><div class="spec-label">Sistem Rate</div><div id="det-rate" class="spec-value"></div></div>
            </div>

            <div class="action-bar">
                <div class="btn-group">
                    <button class="btn-main" onclick="alert('Cerere trimisă! Vă vom contacta în scurt timp.')">Rezervă Test Drive</button>
                    <button class="btn-sec">Descarcă Specificații PDF</button>
                </div>
                <div class="stock-badge">
                    <div class="pulse"></div>
                    <span style="color: var(--success); font-weight: 700; font-size: 0.9rem;">ÎN STOC ELITE</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cars = [
            { id: 1, nume: "Range Rover Sport 2020", pret: 65000, motorizare: "3.0 Diesel SDV6", hp: "306 CP", acc: "7.3 s", speed: "209 km/h", weight: "2135 kg", tara: "Marea Britanie", faruri: "Matrix LED", img: "imagini/sport.jpg", tractiune: "Integrala 4x4", km: "45.000 km", rate: "Disponibil", euro: "Euro 6d" },
            { id: 2, nume: "Jaguar XF 2017", pret: 22000, motorizare: "2.0 Diesel i4", hp: "180 CP", acc: "8.1 s", speed: "229 km/h", weight: "1595 kg", tara: "Marea Britanie", faruri: "Bi-Xenon Adaptive", img: "imagini/xf.jpg", tractiune: "Spate (RWD)", km: "112.000 km", rate: "Disponibil", euro: "Euro 6" },
            { id: 3, nume: "BMW Seria 4 2016", pret: 24500, motorizare: "2.0 Benzina 428i", hp: "245 CP", acc: "5.8 s", speed: "250 km/h", weight: "1530 kg", tara: "Germania", faruri: "LED Adaptive", img: "imagini/4series.jpg", tractiune: "Spate (RWD)", km: "98.000 km", rate: "Disponibil", euro: "Euro 6" },
            { id: 4, nume: "Audi A6 C7 2013", pret: 15800, motorizare: "3.0 TDI V6", hp: "245 CP", acc: "6.1 s", speed: "250 km/h", weight: "1795 kg", tara: "Germania", faruri: "Full LED", img: "imagini/a6.jpg", tractiune: "Integrala (Quattro)", km: "185.000 km", rate: "Disponibil", euro: "Euro 5" },
            { id: 5, nume: "Mercedes GLE 2014", pret: 28900, motorizare: "3.0 Diesel 350d", hp: "258 CP", acc: "7.1 s", speed: "226 km/h", weight: "2175 kg", tara: "Germania", faruri: "Intelligent Light System", img: "imagini/gle.jpg", tractiune: "Integrala (4MATIC)", km: "145.000 km", rate: "Disponibil", euro: "Euro 6" },
            { id: 6, nume: "Porsche Cayenne 2018", pret: 58000, motorizare: "3.0 V6 Turbo", hp: "340 CP", acc: "6.2 s", speed: "245 km/h", weight: "1985 kg", tara: "Germania", faruri: "PDLS Matrix LED", img: "imagini/cayenne.jpg", tractiune: "Integrala 4x4", km: "67.000 km", rate: "Disponibil", euro: "Euro 6" },
            { id: 7, nume: "Mercedes S Class 2015", pret: 39500, motorizare: "3.5 Benzina Hybrid", hp: "306 CP", acc: "6.8 s", speed: "250 km/h", weight: "1925 kg", tara: "Germania", faruri: "Multibeam LED", img: "imagini/sclass.jpg", tractiune: "Spate (RWD)", km: "120.000 km", rate: "Disponibil", euro: "Euro 6" },
            { id: 8, nume: "Audi A7 2019", pret: 47000, motorizare: "3.0 TFSI V6", hp: "340 CP", acc: "5.3 s", speed: "250 km/h", weight: "1815 kg", tara: "Germania", faruri: "HD Matrix LED", img: "imagini/a7.jpg", tractiune: "Integrala (Quattro)", km: "55.000 km", rate: "Disponibil", euro: "Euro 6d" },
            { id: 9, nume: "Toyota Land Cruiser 2022", pret: 82000, motorizare: "3.3 Diesel V6", hp: "309 CP", acc: "6.9 s", speed: "210 km/h", weight: "2630 kg", tara: "Japonia", faruri: "Triple Beam LED", img: "imagini/cruiser.jpg", tractiune: "4x4 Permanent", km: "15.000 km", rate: "Disponibil", euro: "Euro 6" },
            { id: 10, nume: "Range Rover Velar 2016", pret: 34000, motorizare: "2.0 Diesel D240", hp: "240 CP", acc: "7.3 s", speed: "217 km/h", weight: "1841 kg", tara: "Marea Britanie", faruri: "Premium LED", img: "imagini/velar.jpg", tractiune: "Integrala 4x4", km: "89.000 km", rate: "Disponibil", euro: "Euro 6" }
        ];

        function renderList() {
            const sort = document.getElementById('sortOrder').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const listDiv = document.getElementById('carList');
            let filtered = cars.filter(c => c.nume.toLowerCase().includes(search));
            filtered.sort((a, b) => sort === 'asc' ? a.pret - b.pret : b.pret - a.pret);
            listDiv.innerHTML = filtered.map(car => `
                <div class="car-item" onclick="showDetails(${car.id}, this)">
                    <div style="font-weight: 800; font-size: 1.15rem;">${car.nume}</div>
                    <div style="font-size: 0.85rem; opacity: 0.6; margin-top: 6px;">${car.pret.toLocaleString()} EUR • ${car.km}</div>
                </div>
            `).join('');
        }

        function showDetails(id, element) {
            const car = cars.find(c => c.id === id);
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('car-details').style.display = 'block';
            document.querySelectorAll('.car-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            document.getElementById('det-nume').innerText = car.nume;
            document.getElementById('det-tara').innerText = car.tara;
            document.getElementById('det-img').src = car.img;
            document.getElementById('det-pret').innerText = car.pret.toLocaleString() + " €";
            document.getElementById('det-motor').innerText = car.motorizare;
            document.getElementById('det-hp').innerText = car.hp;
            document.getElementById('det-tractiune').innerText = car.tractiune;
            document.getElementById('det-km').innerText = car.km;
            document.getElementById('det-acc').innerText = car.acc;
            document.getElementById('det-speed').innerText = car.speed;
            document.getElementById('det-euro').innerText = car.euro;
            document.getElementById('det-weight').innerText = car.weight;
            document.getElementById('det-lights').innerText = car.faruri;
            document.getElementById('det-rate').innerText = car.rate;
        }

        window.onload = renderList;
    </script>
</body>
</html>
